name: Daily YouTube RSS

# Run daily at 12:00 PM UTC
# Note: GitHub Actions uses UTC. 
# Convert this cron schedule to your local timezone.
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push state.json back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv

      - name: Run Main Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python main.py

      - name: Commit and Push State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add channel_cache.json history.json
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push
